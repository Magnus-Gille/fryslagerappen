name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Use Node.js 24 LTS
        uses: actions/setup-node@v6
        with:
          node-version: 24.18.0

      - name: Download pinned PocketBase release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="$(tr -d '[:space:]' < backend/VERSION)"
          release="https://github.com/pocketbase/pocketbase/releases/download/v${version}"
          curl -fsSLO "${release}/pocketbase_${version}_linux_amd64.zip"
          curl -fsSLo checksums.txt "${release}/checksums.txt"
          grep " pocketbase_${version}_linux_amd64.zip$" checksums.txt | sha256sum --check
          unzip -q "pocketbase_${version}_linux_amd64.zip" pocketbase
          chmod 0755 pocketbase

      - name: Test migrations and authorization routes
        env:
          POCKETBASE_BIN: ${{ github.workspace }}/pocketbase
        run: ./scripts/test-backend.sh

  app:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Use Node.js 24 LTS
        uses: actions/setup-node@v6
        with:
          node-version: 24.18.0
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate Expo project
        run: npm run doctor -- --verbose

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build static web output
        run: npm run build:web

      - name: Fail on high or critical dependency advisories
        run: npm audit --audit-level=high
